name: Build & Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        required: true
        default: staging
        type: choice
        options: [staging, production]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ─────────────────────────────────────────────────────────────────────────
  # 1. Build and push Docker image to GitHub Container Registry
  # ─────────────────────────────────────────────────────────────────────────
  build:
    name: Build Docker image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ steps.tag.outputs.tag }}

    steps:
      - uses: actions/checkout@v4

      - name: Set image tag
        id: tag
        run: echo "tag=sha-${GITHUB_SHA::8}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=sha-${{ github.sha }}
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64

  # ─────────────────────────────────────────────────────────────────────────
  # 2. Deploy to staging on every main push
  # ─────────────────────────────────────────────────────────────────────────
  deploy-staging:
    name: Deploy → staging
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    environment:
      name: staging
      url: https://www2.iqm.org.my

    steps:
      - uses: actions/checkout@v4

      - name: Upload compose file to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host:     ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key:      ${{ secrets.VPS_SSH_KEY }}
          port:     ${{ secrets.VPS_PORT || 22 }}
          source:   docker-compose.prod.yml
          target:   /opt/iqm-web/

      - name: SSH deploy
        uses: appleboy/ssh-action@v1
        env:
          IMAGE: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ needs.build.outputs.image_tag }}
          GHCR_USER: ${{ secrets.GHCR_USER }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
        with:
          host:     ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key:      ${{ secrets.VPS_SSH_KEY }}
          port:     ${{ secrets.VPS_PORT || 22 }}
          envs:     IMAGE,GHCR_USER,GHCR_TOKEN
          script: |
            set -euo pipefail
            cd /opt/iqm-web

            echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USER" --password-stdin

            # Pin exact SHA in the compose file
            sed -i "s|image:.*iqm-web.*|image: ${IMAGE}|" docker-compose.prod.yml

            docker compose -f docker-compose.prod.yml pull app
            docker compose -f docker-compose.prod.yml up -d --remove-orphans
            docker image prune -f --filter "until=72h"

            echo "✓ Deployed: ${IMAGE}"

  # ─────────────────────────────────────────────────────────────────────────
  # 3. Promote to production — manual trigger only
  # ─────────────────────────────────────────────────────────────────────────
  deploy-production:
    name: Deploy → production
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'production'
    environment:
      name: production
      url: https://www.iqm.org.my

    steps:
      - uses: actions/checkout@v4

      - name: Upload compose file to production VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host:     ${{ secrets.PROD_VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key:      ${{ secrets.VPS_SSH_KEY }}
          port:     ${{ secrets.VPS_PORT || 22 }}
          source:   docker-compose.prod.yml
          target:   /opt/iqm-web/

      - name: SSH deploy to production
        uses: appleboy/ssh-action@v1
        env:
          IMAGE: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ needs.build.outputs.image_tag }}
          GHCR_USER: ${{ secrets.GHCR_USER }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
        with:
          host:     ${{ secrets.PROD_VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key:      ${{ secrets.VPS_SSH_KEY }}
          port:     ${{ secrets.VPS_PORT || 22 }}
          envs:     IMAGE,GHCR_USER,GHCR_TOKEN
          script: |
            set -euo pipefail
            cd /opt/iqm-web

            echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USER" --password-stdin

            sed -i "s|image:.*iqm-web.*|image: ${IMAGE}|" docker-compose.prod.yml

            docker compose -f docker-compose.prod.yml pull app
            docker compose -f docker-compose.prod.yml up -d --remove-orphans
            docker image prune -f --filter "until=72h"

            echo "✓ Production deployed: ${IMAGE}"
