# /etc/nginx/sites-available/iqm-web
# Symlink: ln -s /etc/nginx/sites-available/iqm-web /etc/nginx/sites-enabled/iqm-web

# ── Gzip ────────────────────────────────────────────────────────────────────
gzip on;
gzip_comp_level 5;
gzip_min_length 256;
gzip_proxied any;
gzip_vary on;
gzip_types
    application/javascript
    application/json
    application/x-font-ttf
    application/xml
    font/opentype
    image/svg+xml
    text/css
    text/plain
    text/xml;

# ── HTTP → HTTPS redirect ───────────────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name www2.iqm.org.my;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS staging ───────────────────────────────────────────────────────────
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name www2.iqm.org.my;

    ssl_certificate     /etc/letsencrypt/live/www2.iqm.org.my/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/www2.iqm.org.my/privkey.pem;
    ssl_session_timeout 1d;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_tickets off;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;

    # HSTS (1 year, no subdomains for staging)
    add_header Strict-Transport-Security "max-age=31536000" always;

    # Security headers
    add_header X-Frame-Options           "SAMEORIGIN"   always;
    add_header X-Content-Type-Options    "nosniff"      always;
    add_header X-XSS-Protection          "1; mode=block" always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy        "camera=(), microphone=(), geolocation=()" always;

    # Rewrite old Drupal file paths to new location
    rewrite ^/sites/default/files/(.*)$ /files/$1 permanent;

    # ── Static assets: long cache ──────────────────────────────────────────
    location /_next/static/ {
        proxy_pass         http://127.0.0.1:3000;
        proxy_cache_valid  200 365d;
        add_header Cache-Control "public, max-age=31536000, immutable";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── Public uploaded files: moderate cache ──────────────────────────────
    location /files/ {
        alias /opt/iqm-web/public/files/;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000";
    }

    location /media/ {
        alias /opt/iqm-web/public/media/;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000";
    }

    location /images/ {
        alias /opt/iqm-web/public/images/;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000";
    }

    # ── Next.js app ────────────────────────────────────────────────────────
    location / {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        'upgrade';
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;
    }
}
