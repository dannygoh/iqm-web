services:
  app:
    # Image tag is pinned by the deploy workflow (sed replaces this line)
    image: ghcr.io/dannygoh/iqm-web:latest
    ports:
      - "127.0.0.1:3000:3000"     # bind to loopback only — Nginx proxies from outside
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    volumes:
      - ./public/files:/app/public/files
      - ./public/media:/app/public/media
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  postgres:
    image: postgres:16-alpine
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: iqm_db
      POSTGRES_USER: iqm
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U iqm -d iqm_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  postgres_data:
