# /etc/nginx/sites-available/iqm-web   (production — www.iqm.org.my)
# Deploy this file once client approves staging.
# Also update nginx.conf (staging) to redirect www2 → www if desired.

gzip on;
gzip_comp_level 5;
gzip_min_length 256;
gzip_proxied any;
gzip_vary on;
gzip_types
    application/javascript
    application/json
    application/x-font-ttf
    application/xml
    font/opentype
    image/svg+xml
    text/css
    text/plain
    text/xml;

# ── HTTP → HTTPS ────────────────────────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name www.iqm.org.my iqm.org.my;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://www.iqm.org.my$request_uri;
    }
}

# ── Redirect bare domain → www ────────────────────────────────────────────
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name iqm.org.my;

    ssl_certificate     /etc/letsencrypt/live/www.iqm.org.my/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/www.iqm.org.my/privkey.pem;

    return 301 https://www.iqm.org.my$request_uri;
}

# ── HTTPS production ─────────────────────────────────────────────────────────
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name www.iqm.org.my;

    ssl_certificate     /etc/letsencrypt/live/www.iqm.org.my/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/www.iqm.org.my/privkey.pem;
    ssl_session_timeout 1d;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_tickets off;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;

    # HSTS with subdomains for production
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;

    # Security headers
    add_header X-Frame-Options           "SAMEORIGIN"   always;
    add_header X-Content-Type-Options    "nosniff"      always;
    add_header X-XSS-Protection          "1; mode=block" always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy        "camera=(), microphone=(), geolocation=()" always;

    # Redirect old Drupal file paths (preserve for any existing bookmarks/links)
    rewrite ^/sites/default/files/(.*)$ /files/$1 permanent;

    # ── Immutable Next.js chunks ──────────────────────────────────────────
    location /_next/static/ {
        proxy_pass         http://127.0.0.1:3000;
        add_header Cache-Control "public, max-age=31536000, immutable";
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── Uploaded / migrated files ─────────────────────────────────────────
    location /files/ {
        alias /opt/iqm-web/public/files/;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000";
    }

    location /media/ {
        alias /opt/iqm-web/public/media/;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000";
    }

    location /images/ {
        alias /opt/iqm-web/public/images/;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000";
    }

    # ── Next.js app proxy ─────────────────────────────────────────────────
    location / {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        'upgrade';
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout    60s;
        proxy_connect_timeout 10s;
    }
}
